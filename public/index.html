<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --card: #ffffff;
        --line: #d8d8d8;
        --text: #121212;
        --muted: #717171;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Proxima Nova", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .left {
        border-right: 1px solid var(--line);
        padding: 40px 96px;
      }
      .left-wrap {
        max-width: 430px;
      }
      .brand {
        width: 147px;
        max-width: 100%;
        margin-bottom: 42px;
      }
      .product {
        width: 112px;
        max-width: 42%;
        display: block;
        margin-bottom: 34px;
      }
      .title {
        font-size: 32px;
        line-height: 1;
        margin: 0 0 20px;
        font-weight: 500;
      }
      .subtitle {
        margin: 0 0 18px;
        font-size: 16px;
        line-height: 1.2;
        letter-spacing: 0.2px;
        text-transform: uppercase;
      }
      .desc {
        margin: 0 0 24px;
        font-size: 14px;
        line-height: 1.3;
      }
      .price {
        margin-top: 4px;
        font-size: 32px;
        font-weight: 700;
      }
      .right {
        background: var(--panel);
        padding: 36px 72px 42px;
      }
      .checkout {
        max-width: 640px;
        margin: 0 auto;
      }
      h2 {
        margin: 0 0 22px;
        font-size: 42px;
        line-height: 1;
        font-weight: 700;
      }
      h3 {
        font-size: 16px;
        margin: 30px 0 12px;
        font-weight: 700;
        color: #525252;
      }
      .field-label {
        margin: 8px 0 8px;
        color: #525252;
        font-size: 16px;
        font-weight: 700;
      }
      #setup-form {
        display: grid;
        gap: 14px;
      }
      .stripe-field {
        background: var(--card);
        border: 1px solid #cfcfcf;
        border-radius: 14px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      #shipping-address-element {
        padding: 12px;
      }
      #payment-element {
        padding: 10px;
      }
      button {
        margin-top: 10px;
        width: 36%;
        padding: 10px 14px;
        border: 0;
        border-radius: 7px;
        background: #0370de;
        color: #ffffff;
        font-size: 16px;
        line-height: 1;
        font-weight: 700;
        cursor: pointer;
      }
      #message {
        min-height: 28px;
        font-size: 20px;
        margin: 8px 2px 0;
      }
      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .left {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          padding: 34px 24px;
        }
        .right {
          padding: 28px 24px 34px;
        }
        .brand {
          width: 170px;
          margin-bottom: 30px;
        }
        .product {
          width: 88px;
          margin-bottom: 16px;
        }
        .title {
          font-size: 42px;
        }
        .subtitle {
          font-size: 19px;
        }
        .desc {
          font-size: 18px;
        }
        .price {
          font-size: 48px;
        }
        h2 {
          font-size: 30px;
          margin-bottom: 12px;
        }
        h3 {
          font-size: 26px;
        }
        .field-label {
          font-size: 18px;
        }
        button {
          font-size: 42px;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="left">
        <div class="left-wrap">
          <img class="brand" src="/assets/lume-logo.png" alt="Lume logo" />
          <img class="product" src="/assets/sertralucin-bottle.png" alt="Sertralucin bottle" />
          <h1 class="title">Sertralucin</h1>
          <p class="subtitle">SERTRALINE HCL (22 mg) AND L-METHYLFOLATE CALCIUM (15 mg)</p>
          <p class="desc">30 day supply on a 90 day fulfillment. Billed monthly until prescription end.</p>
          <div class="price">$29.67</div>
        </div>
      </section>
      <section class="right">
        <div class="checkout">
          <form id="setup-form">
            <div class="field-label">Shipping address</div>
            <div id="shipping-address-element" class="stripe-field"></div>

            <h3>Payment method</h3>
            <div id="payment-element" class="stripe-field"></div>
            <button type="submit">Pay</button>
            <p id="message"></p>
          </form>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("setup-form");
      const messageEl = document.getElementById("message");
      let stripe;
      let elements;
      let addressElement;
      let paymentElement;
      let setupIntentClientSecret = "";

      function newIdempotencyKey(prefix) {
        if (window.crypto && window.crypto.randomUUID) {
          return `${prefix}-${window.crypto.randomUUID()}`;
        }
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      async function setupStripe() {
        const configRes = await fetch("/config");
        const config = await configRes.json();
        stripe = Stripe(config.publishableKey);

        const customerRes = await fetch("/create-customer", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Idempotency-Key": newIdempotencyKey("customer")
          },
          body: JSON.stringify({})
        });
        const customerData = await customerRes.json();
        if (!customerRes.ok) {
          throw new Error(customerData.error || "Could not create customer");
        }

        const setupIntentRes = await fetch("/create-setup-intent", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Idempotency-Key": newIdempotencyKey("setup-intent")
          },
          body: JSON.stringify({ customerId: customerData.customerId })
        });
        const setupIntentData = await setupIntentRes.json();
        if (!setupIntentRes.ok) {
          throw new Error(setupIntentData.error || "Could not create SetupIntent");
        }
        setupIntentClientSecret = setupIntentData.clientSecret;

        elements = stripe.elements({
          clientSecret: setupIntentClientSecret,
          appearance: { theme: "stripe" }
        });

        addressElement = elements.create("address", {
          mode: "shipping",
          autocomplete: { mode: "automatic" }
        });
        addressElement.mount("#shipping-address-element");

        paymentElement = elements.create("payment", {
          layout: "tabs"
        });
        paymentElement.mount("#payment-element");
      }

      function setMessage(msg, isError = false) {
        messageEl.textContent = msg;
        messageEl.style.color = isError ? "crimson" : "green";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setMessage("Saving card...");

        try {
          const submitResult = await elements.submit();
          if (submitResult.error) {
            throw new Error(submitResult.error.message);
          }

          const result = await stripe.confirmSetup({
            elements,
            redirect: "if_required",
            confirmParams: {
              payment_method_data: {
                billing_details: {}
              }
            }
          });

          if (result.error) {
            throw new Error(result.error.message);
          }

          setMessage(
            `Card saved. SetupIntent ${result.setupIntent.id} is ${result.setupIntent.status}.`
          );
        } catch (err) {
          setMessage(err.message, true);
        }
      });

      setupStripe().catch((err) => setMessage(err.message, true));
    </script>
  </body>
</html>
